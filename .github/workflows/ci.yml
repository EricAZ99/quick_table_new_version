name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    # MONGODB_URI/REDIS_URL : pointent vers les bases staging reelles
    # (Atlas/Upstash), pas un mock - le test d'integration du module de
    # reference (doc 12, Feature 0.3) verifie le pattern controller ->
    # service -> repository -> tenantScope -> Mongo/Redis de bout en
    # bout, a chaque push/PR, pas seulement lors d'une verification
    # manuelle ponctuelle.
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      # Signature HS256 de l'Access Token (doc 07 §7.1) : contrairement à
      # MONGODB_URI/REDIS_URL, ne pointe vers aucune infra tierce réelle,
      # mais reste un secret de signature — jamais committé en clair même
      # pour un usage CI/test.
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
